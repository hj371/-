<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>النبي ﷺ</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');

body {
  margin: 0;
  font-family: 'Cairo', sans-serif;
  text-align: center;
  color: #2c2c2c;
  background: linear-gradient(135deg,#f7e7b8,#dfe8ff);
}

/* pattern background */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(30deg, rgba(201,164,76,0.08) 12%, transparent 12.5%),
    linear-gradient(150deg, rgba(201,164,76,0.08) 12%, transparent 12.5%);
  background-size: 80px 140px;
  pointer-events: none;
}

/* decorative shapes */
body::after {
  content: "";
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at 20% 80%, rgba(201,164,76,0.2), transparent 30%),
    radial-gradient(circle at 80% 20%, rgba(74,144,226,0.2), transparent 30%);
  pointer-events: none;
}

h1 {
  margin-top: 25px;
  color: #8a6d3b;
}

button {
  padding: 12px 20px;
  border: none;
  border-radius: 20px;
  background: linear-gradient(45deg,#c9a44c,#f1d48b);
  cursor: pointer;
  margin-top: 10px;
}

.container {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(120px,1fr));
  gap: 15px;
  padding: 30px;
}

.bubble {
  height: 120px;
  border-radius: 50%;
  background: radial-gradient(circle,#fff,#d9e7ff);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-weight: bold;
  border: 2px solid #e0c878;
  box-shadow: 0 8px 18px rgba(0,0,0,0.15);
  transition: 0.3s;
}

.bubble:hover {
  transform: scale(1.1);
}

.bubble.active {
  background: radial-gradient(circle,#fff,#ffe7a0);
  box-shadow: 0 0 20px gold;
}

.info {
  margin: 20px auto;
  max-width: 700px;
  background: white;
  padding: 20px;
  border-radius: 20px;
  border-top: 5px solid #c9a44c;
  animation: fade 0.3s;
}

@keyframes fade {
  from {opacity:0;}
  to {opacity:1;}
}
</style>

</head>

<body>
