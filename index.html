<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>النبي ﷺ</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Cairo', sans-serif;
      text-align: center;
      color: #2c2c2c;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.55), transparent 35%),
        radial-gradient(circle at 80% 30%, rgba(255,255,255,0.35), transparent 35%),
        linear-gradient(135deg, #f7e7b8, #dfe8ff);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(rgba(201,164,76,0.16) 1px, transparent 1px),
        radial-gradient(rgba(74,144,226,0.12) 1px, transparent 1px);
      background-size: 38px 38px, 58px 58px;
      background-position: 0 0, 19px 19px;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      width: min(1100px, 94vw);
      margin: 0 auto;
      padding: 24px 0 40px;
    }

    h1 {
      margin: 10px 0 8px;
      font-size: clamp(2rem, 4vw, 3rem);
      color: #8a6d3b;
    }

    .subtitle {
      margin: 0 auto 18px;
      max-width: 760px;
      font-size: 1rem;
      line-height: 1.9;
      color: #5a5a5a;
    }

    .top-actions {
      margin-bottom: 18px;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 12px 22px;
      cursor: pointer;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      background: linear-gradient(45deg, #c9a44c, #f1d48b);
      box-shadow: 0 8px 18px rgba(0,0,0,0.12);
      transition: transform 0.2s ease;
    }

    button:hover {
      transform: translateY(-2px);
    }

    .bubbles {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 18px;
      align-items: center;
      justify-items: center;
      margin: 24px 0 28px;
    }

    .bubble {
      width: 135px;
      height: 135px;
      border-radius: 50%;
      border: 2px solid #e0c878;
      background: radial-gradient(circle at 30% 30%, #ffffff, #d9e7ff);
      box-shadow: 0 10px 22px rgba(0,0,0,0.14);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 14px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 700;
      color: #24456b;
      transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
      animation: float 4s ease-in-out infinite;
      user-select: none;
    }

    .bubble:nth-child(2n) { animation-delay: 0.5s; }
    .bubble:nth-child(3n) { animation-delay: 1s; }

    .bubble:hover {
      transform: scale(1.08);
    }

    .bubble.active {
      background: radial-gradient(circle at 30% 30%, #ffffff, #ffe7a0);
      box-shadow: 0 0 24px rgba(201,164,76,0.65), 0 10px 22px rgba(0,0,0,0.16);
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .info-box {
      max-width: 860px;
      margin: 0 auto;
      background: rgba(255,255,255,0.94);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.12);
      border-top: 5px solid #c9a44c;
      text-align: right;
    }

    .info-title {
      margin: 0 0 10px;
      font-size: 1.4rem;
      color: #8a6d3b;
    }

    .info-text {
      margin: 0;
      font-size: 1.05rem;
      line-height: 2;
      color: #334;
      animation: fadeIn 0.35s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 600px) {
      .bubble {
        width: 120px;
        height: 120px;
        font-size: 0.95rem;
      }

      .info-box {
        padding: 18px;
      }

      .info-text {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>النبي ﷺ</h1>
    <p class="subtitle">
      فقاعات تفاعلية تعرض معلومات أساسية وبعض الصفات الجميلة عن النبي محمد صلى الله عليه وسلم.
    </p>

    <div class="top-actions">
      <button id="randomBtn">اختر عشوائياً</button>
    </div>

    <div class="bubbles" id="bubblesContainer">
      <div class="bubble" data-key="name">اسمه</div>
      <div class="bubble" data-key="mother">أمه</div>
      <div class="bubble" data-key="father">أبوه</div>
      <div class="bubble" data-key="grandfather">جده</div>
      <div class="bubble" data-key="wetnurse">مربيته</div>
      <div class="bubble" data-key="birth">مولده</div>
      <div class="bubble" data-key="naming">تسميته</div>
      <div class="bubble" data-key="childhood">طفولته</div>
      <div class="bubble" data-key="mercy">رحمته</div>
      <div class="bubble" data-key="honesty">صدقه</div>
      <div class="bubble" data-key="patience">صبره</div>
      <div class="bubble" data-key="justice">عدله</div>
      <div class="bubble" data-key="humility">تواضعه</div>
      <div class="bubble" data-key="forbearance">حلمه</div>
    </div>

    <div class="info-box">
      <h2 class="info-title" id="infoTitle">مرحباً بك</h2>
      <p class="info-text" id="infoText">اضغط على أي فقاعة لعرض المعلومات هنا.</p>
    </div>
  </div>

  <script>
    const data = {
      name: {
        title: "اسمه",
        text: "هو محمد بن عبد الله صلى الله عليه وسلم، خاتم الأنبياء والمرسلين."
      },
      mother: {
        title: "أمه",
        text: "أمه آمنة بنت وهب."
      },
      father: {
        title: "أبوه",
        text: "أبوه عبد الله بن عبد المطلب."
      },
      grandfather: {
        title: "جده",
        text: "كفله جده عبد المطلب، وكان له مكانة خاصة عنده."
      },
      wetnurse: {
        title: "مربيته",
        text: "أرضعته حليمة السعدية من بني سعد، ونشأ في البادية في أول طفولته."
      },
      birth: {
        title: "مولده",
        text: "ولد النبي صلى الله عليه وسلم في شهر ربيع الأول."
      },
      naming: {
        title: "تسميته",
        text: "سماه جده عبد المطلب محمداً."
      },
      childhood: {
        title: "طفولته",
        text: "نشأ يتيماً، ثم كفله جده، وبعد ذلك عمه أبو طالب."
      },
      mercy: {
        title: "رحمته",
        text: "كان النبي صلى الله عليه وسلم رحيماً بالناس جميعاً."
      },
      honesty: {
        title: "صدقه",
        text: "عُرف بين قومه بالصدق والأمانة."
      },
      patience: {
        title: "صبره",
        text: "كان صبوراً على الأذى، ثابتاً في دعوته."
      },
      justice: {
        title: "عدله",
        text: "كان عادلاً في أحكامه وتعاملاته."
      },
      humility: {
        title: "تواضعه",
        text: "كان متواضعاً، قريباً من الناس، لا يتكبر عليهم."
      },
      forbearance: {
        title: "حلمه",
        text: "كان حليماً واسع الصدر، يقابل الإساءة بالعفو والرفق."
      }
    };

    const bubbles = document.querySelectorAll(".bubble");
    const infoTitle = document.getElementById("infoTitle");
    const infoText = document.getElementById("infoText");
    const randomBtn = document.getElementById("randomBtn");

    function activateBubble(key) {
      bubbles.forEach((bubble) => {
        bubble.classList.toggle("active", bubble.dataset.key === key);
      });

      infoTitle.textContent = data[key].title;

      infoText.style.animation = "none";
      void infoText.offsetWidth;
      infoText.textContent = data[key].text;
      infoText.style.animation = "fadeIn 0.35s ease";
    }

    bubbles.forEach((bubble) => {
      bubble.addEventListener("click", () => {
        activateBubble(bubble.dataset.key);
      });
    });

    randomBtn.addEventListener("click", () => {
      const keys = Object.keys(data);
      const key = keys[Math.floor(Math.random() * keys.length)];

      infoTitle.textContent = "جاري الاختيار...";
      infoText.style.animation = "none";
      void infoText.offsetWidth;
      infoText.textContent = "لحظة واحدة";
      infoText.style.animation = "fadeIn 0.35s ease";

      setTimeout(() => {
        activateBubble(key);
      }, 600);
    });
  </script>
</body>
</html>
