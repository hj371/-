<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>النبي ﷺ</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');

body {
  margin: 0;
  font-family: 'Cairo', sans-serif;
  text-align: center;
  background: linear-gradient(135deg,#f7e7b8,#dfe8ff);
  color: #333;
}

/* background pattern */
body::before {
  content:"";
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(30deg, rgba(201,164,76,0.08) 12%, transparent 12.5%),
    linear-gradient(150deg, rgba(201,164,76,0.08) 12%, transparent 12.5%);
  background-size:80px 140px;
  pointer-events:none;
}

/* header */
.logo {
  font-size: 38px;
  margin-top: 20px;
  color: #9d7a3b;
}

h1 {
  margin: 5px 0;
  font-size: 42px;
  color: #8a6d3b;
}

.subtitle {
  max-width: 700px;
  margin: 0 auto 10px;
}

/* button */
button {
  margin: 15px 0;
  padding: 12px 25px;
  border-radius: 25px;
  border: none;
  background: linear-gradient(45deg,#c9a44c,#f1d48b);
  cursor: pointer;
}

/* bubbles */
.container {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(120px,1fr));
  gap: 15px;
  padding: 20px;
}

.bubble {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  margin:auto;
  background: radial-gradient(circle,#fff,#e7edf7);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  border:2px solid #e0c878;
  box-shadow:0 6px 14px rgba(0,0,0,0.15);
  transition:0.3s;
}

.bubble:hover {
  transform:scale(1.08);
}

.bubble.active {
  background: radial-gradient(circle,#fff,#ffe7a0);
  box-shadow:0 0 15px gold;
}

/* info box */
.info-box {
  max-width: 700px;
  margin: 10px auto 40px;
  background:white;
  padding:20px;
  border-radius:20px;
  border-top:5px solid #c9a44c;
}

.info-title {
  font-size: 22px;
  color:#8a6d3b;
}

.info-text {
  font-size: 18px;
  line-height:1.8;
}

/* mobile */
@media (max-width:600px){
  .bubble{
    width:100px;
    height:100px;
    font-size:14px;
  }
}
</style>
</head>

<body>

<div class="logo">ﷺ</div>
<h1>النبي</h1>

<p class="subtitle">
فقاعات تفاعلية تعرض معلومات أساسية وبعض الصفات الجميلة عن النبي محمد صلى الله عليه وسلم.
</p>

<button onclick="randomPick()">اختر عشوائياً</button>

<div class="container">

<div class="bubble" onclick="show('name')">اسمه</div>
<div class="bubble" onclick="show('mother')">أمه</div>
<div class="bubble" onclick="show('father')">أبوه</div>
<div class="bubble" onclick="show('grandfather')">جده</div>
<div class="bubble" onclick="show('wetnurse')">مربيته</div>
<div class="bubble" onclick="show('birth')">مولده</div>
<div class="bubble" onclick="show('naming')">تسميته</div>
<div class="bubble" onclick="show('childhood')">طفولته</div>

<div class="bubble" onclick="show('mercy')">رحمته</div>
<div class="bubble" onclick="show('honesty')">صدقه</div>
<div class="bubble" onclick="show('patience')">صبره</div>
<div class="bubble" onclick="show('justice')">عدله</div>
<div class="bubble" onclick="show('humility')">تواضعه</div>
<div class="bubble" onclick="show('forbearance')">حلمه</div>

</div>

<div class="info-box">
  <div class="info-title" id="infoTitle">مرحباً بك</div>
  <div class="info-text" id="infoText">اضغط على أي فقاعة لعرض المعلومات</div>
</div>

<script>

const data = {
  name: {title:"اسمه", text:"هو محمد بن عبد الله صلى الله عليه وسلم."},
  mother: {title:"أمه", text:"أمه آمنة بنت وهب."},
  father: {title:"أبوه", text:"أبوه عبد الله بن عبد المطلب."},
  grandfather: {title:"جده", text:"كفله جده عبد المطلب."},
  wetnurse: {title:"مربيته", text:"أرضعته حليمة السعدية."},
  birth: {title:"مولده", text:"ولد في شهر ربيع الأول."},
  naming: {title:"تسميته", text:"سماه جده محمدًا."},
  childhood: {title:"طفولته", text:"نشأ يتيماً وكفله عمه أبو طالب."},

  mercy: {title:"رحمته", text:"كان رحيماً بالناس."},
  honesty: {title:"صدقه", text:"عُرف بالصدق والأمانة."},
  patience: {title:"صبره", text:"كان صبوراً على الأذى."},
  justice: {title:"عدله", text:"كان عادلاً."},
  humility: {title:"تواضعه", text:"كان متواضعاً."},
  forbearance: {title:"حلمه", text:"كان حليماً."}
};

function show(key){
  document.querySelectorAll(".bubble").forEach(b=>b.classList.remove("active"));
  event.target.classList.add("active");

  document.getElementById("infoTitle").innerText = data[key].title;
  document.getElementById("infoText").innerText = data[key].text;
}

function randomPick(){
  const keys = Object.keys(data);
  const random = keys[Math.floor(Math.random()*keys.length)];
  document.getElementById("infoTitle").innerText = "جاري الاختيار...";
  setTimeout(()=>{
    document.getElementById("infoTitle").innerText = data[random].title;
    document.getElementById("infoText").innerText = data[random].text;
  },500);
}

</script>

</body>
</html>
